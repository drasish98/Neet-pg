<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#2dd4bf;--accent-g:rgba(45,212,191,.12);--amber:#fbbf24;--amber-g:rgba(251,191,36,.12);--rose:#fb7185;--rose-g:rgba(251,113,133,.12);--green:#4ade80;--green-g:rgba(74,222,128,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}
h1,h2,h3,h4,h5{font-family:'Space Grotesk',sans-serif}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--muted)}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--border);z-index:50;transition:transform .3s ease;display:flex;flex-direction:column}
.sidebar .logo{padding:24px 20px;border-bottom:1px solid var(--border)}
.sidebar nav{flex:1;overflow-y:auto;padding:12px 10px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-radius:10px;cursor:pointer;color:var(--muted);transition:all .2s;font-size:14px;font-weight:500;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.nav-item.active{background:var(--accent-g);color:var(--accent)}
.nav-item i{width:20px;text-align:center;font-size:15px}
.main{margin-left:260px;min-height:100vh;position:relative}
.main::before{content:'';position:fixed;top:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(45,212,191,.06),transparent 70%);pointer-events:none;z-index:0}
.main::after{content:'';position:fixed;bottom:-200px;left:200px;width:400px;height:400px;background:radial-gradient(circle,rgba(251,191,36,.04),transparent 70%);pointer-events:none;z-index:0}
.content{padding:32px;position:relative;z-index:1;max-width:1200px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;transition:all .25s}
.card:hover{border-color:rgba(255,255,255,.08)}
.btn{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-accent{background:var(--accent);color:#0d1117}.btn-accent:hover{background:#5eead4;transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:8px}
.btn-rose{background:var(--rose);color:#0d1117}.btn-rose:hover{background:#fda4af}
.progress-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.22,1,.36,1)}
.progress-bar-sm{height:6px}
.topic-check{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:background .15s;font-size:14px}
.topic-check:hover{background:rgba(255,255,255,.03)}
.topic-check input[type="checkbox"]{appearance:none;width:18px;height:18px;border:2px solid var(--border);border-radius:5px;cursor:pointer;position:relative;flex-shrink:0;transition:all .2s}
.topic-check input[type="checkbox"]:checked{background:var(--accent);border-color:var(--accent)}
.topic-check input[type="checkbox"]:checked::after{content:'\f00c';font-family:'Font Awesome 6 Free';font-weight:900;font-size:10px;color:#0d1117;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.toast-container{position:fixed;top:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;border-radius:12px;font-size:14px;font-weight:500;animation:slideIn .3s ease;display:flex;align-items:center;gap:10px;backdrop-filter:blur(12px);border:1px solid var(--border)}
.toast-success{background:rgba(74,222,128,.15);color:var(--green);border-color:rgba(74,222,128,.2)}
.toast-info{background:rgba(45,212,191,.15);color:var(--accent);border-color:rgba(45,212,191,.2)}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease both}
.fade-up-d1{animation-delay:.05s}.fade-up-d2{animation-delay:.1s}.fade-up-d3{animation-delay:.15s}.fade-up-d4{animation-delay:.2s}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
.mobile-toggle{display:none;position:fixed;top:16px;left:16px;z-index:60;width:44px;height:44px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);color:var(--text);cursor:pointer;align-items:center;justify-content:center;font-size:18px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:45}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.sidebar-overlay.open{display:block}.mobile-toggle{display:flex}.main{margin-left:0}.content{padding:20px;padding-top:72px}}
.subject-accordion{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:8px;background:var(--bg2)}
.subject-header{padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:background .15s}
.subject-header:hover{background:rgba(255,255,255,.02)}
.subject-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.subject-body.open{max-height:2000px}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;font-family:'DM Sans',sans-serif}
.filter-btn.active{background:var(--accent-g);color:var(--accent);border-color:var(--accent)}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.schedule-slot{display:flex;align-items:center;gap:14px;padding:10px 14px;border-radius:10px;transition:all .15s;cursor:default;border-left:3px solid transparent}
.schedule-slot.study{cursor:pointer}
.schedule-slot.study:hover{background:rgba(255,255,255,.03)}
.schedule-slot.checked{background:rgba(74,222,128,.05);border-left-color:var(--green)}
.schedule-slot.current-slot{background:var(--accent-g);border-left-color:var(--accent)}
.schedule-slot.break-slot{border-left-color:var(--border);opacity:.6}
.schedule-slot .slot-check{appearance:none;width:20px;height:20px;border:2px solid var(--border);border-radius:6px;cursor:pointer;position:relative;flex-shrink:0;transition:all .2s}
.schedule-slot .slot-check:checked{background:var(--green);border-color:var(--green)}
.schedule-slot .slot-check:checked::after{content:'\f00c';font-family:'Font Awesome 6 Free';font-weight:900;font-size:10px;color:#0d1117;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.stat-card{position:relative;overflow:hidden}
.input-field{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;width:100%}
.input-field:focus{border-color:var(--accent)}
.log-table{width:100%;border-collapse:collapse;font-size:13px}
.log-table th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.log-table td{padding:10px 12px;border-bottom:1px solid rgba(48,54,61,.5)}
.log-table tr:hover td{background:rgba(255,255,255,.02)}
.day-card{padding:14px 16px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .2s;background:var(--bg2)}
.day-card:hover{border-color:rgba(255,255,255,.12);transform:translateY(-2px)}
.day-card.current{border-color:var(--accent);box-shadow:0 0 20px var(--accent-g)}
.day-card.completed{opacity:.5}
.day-card.off-day{border-color:var(--amber);background:var(--amber-g);opacity:.7}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.phase-1{background:var(--accent-g);color:var(--accent)}.phase-2{background:var(--amber-g);color:var(--amber)}.phase-3{background:var(--rose-g);color:var(--rose)}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr !important}.stat-row,.chart-row,.ana-top{grid-template-columns:1fr !important}}
.backup-btn{flex:1;padding:6px 0;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.backup-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-g)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-box{max-width:440px;width:90%;animation:fadeUp .25s ease}
</style>
</head>

</div>

function isOffDay(d){return d.getMonth()===7&&d.getDate()===1;}
function isExam(d){return d.getMonth()===7&&d.getDate()>=29;}
function getCalDate(dn){if(!state.startDate)return null;var s=new Date(state.startDate+'T00:00:00');var d=new Date(s);var c=0;while(c<dn-1){d.setDate(d.getDate()+1);if(isOffDay(d))continue;c++;}return d;}
function getCurDay(){if(!state.startDate)return null;var s=new Date(state.startDate+'T00:00:00');var n=new Date();s.setHours(0,0,0,0);n.setHours(0,0,0,0);if(n<=s)return 1;var d=new Date(s);var c=1;while(d<n){d.setDate(d.getDate()+1);if(isOffDay(d))continue;c++;}return c>62?null:c;}
function getPhase(dn){for(var i=0;i<PLAN.length;i++)if(PLAN[i].d===dn)return PLAN[i].p;return 1;}
function getSubForDay(dn){for(var i=0;i<PLAN.length;i++)if(PLAN[i].d===dn)return PLAN[i].s;return 'Revision';}
function getSched(dn){return getPhase(dn)===1?SCHED_P1:SCHED_P23;}
function getSubProg(name){var sub=null;for(var i=0;i<SUBJECTS.length;i++)if(SUBJECTS[i].name===name){sub=SUBJECTS[i];break;}if(!sub)return 0;var done=0;for(var j=0;j<sub.topics.length;j++)if(state.topics[name]&&state.topics[name][sub.topics[j]])done++;return sub.topics.length?Math.round(done/sub.topics.length*100):0;}
function getOverall(){var ws=0;for(var i=0;i<SUBJECTS.length;i++)ws+=getSubProg(SUBJECTS[i].name)*SUBJECTS[i].w;return Math.round(ws/TOTAL_W);}
function progCol(p){return p>=70?'var(--green)':p>=30?'var(--amber)':'var(--rose)';}
function subCol(n){if(['Anatomy','Physiology','Biochemistry'].indexOf(n)>=0)return'var(--accent)';if(['Pathology','Pharmacology','Microbiology'].indexOf(n)>=0)return'var(--amber)';if(['General Medicine','General Surgery','OBG','Pediatrics'].indexOf(n)>=0)return'var(--green)';return'var(--rose)';}
function getStats(){var th=0,tm=0,days=0;var keys=Object.keys(state.studyLog);for(var i=0;i<keys.length;i++){var l=state.studyLog[keys[i]];th+=l.hours||0;tm+=l.mcqs||0;days++;}return{th:th,tm:tm,days:days};}
function getStreak(){var streak=0;var d=new Date();d.setHours(0,0,0,0);while(true){var k=d.toISOString().split('T')[0];if(state.studyLog[k]&&(state.studyLog[k].hours>0||state.studyLog[k].mcqs>0)){streak++;d.setDate(d.getDate()-1);}else break;}return streak;}
function fmtDate(d){return d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function fmtShort(d){return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});}
function getCurSlot(sched){var n=new Date();var cm=n.getHours()*60+n.getMinutes();for(var i=0;i<sched.length;i++)if(sched[i].type==='study'&&cm>=sched[i].sm&&cm<sched[i].em)return i;for(var i=0;i<sched.length;i++)if(sched[i].type==='study'&&cm<sched[i].sm)return i;return-1;}

x"><div class="progress-fill" style="width:'+(sIds.length?Math.round(doneC/sIds.length*100):0)+'%;background:var(--green)"></div></div></div></div><div style="display:flex;flex-direction:column;gap:2px">'+slots+'</div></div>';}

iv></div></div><div class="card stat-card fade-up fade-up-d3"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div style="width:36px;height:36px;border-radius:10px;background:var(--rose-g);display:flex;align-items:center;justify-content:center"><i class="fas fa-fire" style="color:var(--rose);font-size:14px"></i></div><span style="color:var(--muted);font-size:13px">Streak</span></div><div style="font-size:28px;font-weight:700;font-family:Space Grotesk">'+streak+'<span style="font-size:14px;color:var(--muted);font-weight:400"> days</span></div></div><div class="card stat-card fade-up fade-up-d4"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div style="width:36px;height:36px;border-radius:10px;background:var(--green-g);display:flex;align-items:center;justify-content:center"><i class="fas fa-calendar-day" style="color:var(--green);font-size:14px"></i></div><span style="color:var(--muted);font-size:13px">Days Logged</span></div><div style="font-size:28px;font-weight:700;font-family:Space Grotesk">'+stats.days+'<span style="font-size:14px;color:var(--muted);font-weight:400"> / 62</span></div></div></div></div>';

function toggleAcc(idx){var b=document.getElementById('accBod'+idx);var i=document.getElementById('accIco'+idx);b.classList.toggle('open');i.style.transform=b.classList.contains('open')?'rotate(180deg)':'';}

function buildTracker(){var stats=getStats();var today=new Date().toISOString().split('T')[0];var logged=state.studyLog[today];var hp=Math.min(100,Math.round(stats.th/600*100));var mp=Math.min(100,Math.round(stats.tm/6000*100));var ah=stats.days?Math.round(stats.th/stats.days*10)/10:0;var am=stats.days?Math.round(stats.tm/stats.days):0;var dates=Object.keys(state.studyLog).sort().reverse().slice(0,15);var lr='';for(var i=0;i<dates.length;i++){var d=dates[i];var l=state.studyLog[d];lr+='<tr><td style="color:var(--text)">'+d+'</td><td><strong style="color:var(--accent)">'+l.hours+'h</strong></td><td><strong style="color:var(--amber)">'+l.mcqs+'</strong></td><td><button class="btn btn-sm btn-outline" style="padding:4px 10px;font-size:11px" onclick="delLog(\''+d+'\')"><i class="fas fa-trash" style="font-size:10px"></i></button></td></tr>';}if(!dates.length)lr='<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:24px">No entries yet.</td></tr>';var last14=Object.keys(state.studyLog).sort().slice(-14);var hArr=[],mArr=[],lArr=[];for(var i=0;i<last14.length;i++){var d=last14[i];var dt=new Date(d+'T00:00:00');lArr.push(dt.getDate()+'/'+(dt.getMonth()+1));hArr.push(state.studyLog[d].hours);mArr.push(state.studyLog[d].mcqs);}chartStore.tL=lArr;chartStore.tH=hArr;chartStore.tM=mArr;return '<div class="fade-up" style="margin-bottom:20px"><h2 style="font-size:22px;margin-bottom:4px">Study Tracker</h2><p style="color:var(--muted);font-size:14px">Log daily hours and MCQs. Target: 600 hours, 6000 MCQs.</p></div><div class="card fade-up fade-up-d1" style="margin-bottom:20px"><h3 style="font-size:16px;margin-bottom:16px"><i class="fas fa-pen-to-square" style="color:var(--accent);margin-right:8px"></i>Log Today &mdash; '+fmtDate(new Date())+'</h3><div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end"><div style="flex:1;min-width:140px"><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">Study Hours</label><input type="number" id="logH" class="input-field" placeholder="e.g. 10" min="0" max="24" step="0.5" value="'+(logged?logged.hours:'')+'"></div><div style="flex:1;min-width:140px"><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">MCQs Completed</label><input type="number" id="logM" class="input-field" placeholder="e.g. 200" min="0" max="2000" step="1" value="'+(logged?logged.mcqs:'')+'"></div><button class="btn btn-accent" onclick="logStudy()" style="height:44px">'+(logged?'Update':'Log Study')+'</button></div></div><div class="stat-row" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px"><div class="card fade-up fade-up-d2" style="text-align:center"><div style="font-size:13px;color:var(--muted);margin-bottom:8px">Study Hours Progress</div><div style="font-size:36px;font-weight:700;font-family:Space Grotesk;color:var(--accent)">'+stats.th+'<span style="font-size:16px;color:var(--muted);font-weight:400">/600</span></div><div class="progress-bar" style="margin:12px 0 8px"><div class="progress-fill" style="width:'+hp+'%;background:var(--accent)"></div></div><div style="font-size:12px;color:var(--muted)">Avg '+ah+'h/day &middot; '+hp+'% complete</div></div><div class="card fade-up fade-up-d3" style="text-align:center"><div style="font-size:13px;color:var(--muted);margin-bottom:8px">MCQs Progress</div><div style="font-size:36px;font-weight:700;font-family:Space Grotesk;color:var(--amber)">'+stats.tm+'<span style="font-size:16px;color:var(--muted);font-weight:400">/6000</span></div><div class="progress-bar" style="margin:12px 0 8px"><div class="progress-fill" style="width:'+mp+'%;background:var(--amber)"></div></div><div style="font-size:12px;color:var(--muted)">Avg '+am+'/day &middot; '+mp+'% complete</div></div></div><div class="chart-row" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px"><div class="card fade-up fade-up-d3"><h4 style="font-size:14px;margin-bottom:12px;color:var(--muted)">Daily Hours (Last 14 days)</h4><canvas id="trkHC" height="160"></canvas></div><div class="card fade-up fade-up-d4"><h4 style="font-size:14px;margin-bottom:12px;color:var(--muted)">Daily MCQs (Last 14 days)</h4><canvas id="trkMC" height="160"></canvas></div></div><div class="card fade-up" style="overflow-x:auto"><h3 style="font-size:16px;margin-bottom:16px">Study Log</h3><table class="log-table"><thead><tr><th>Date</th><th>Hours</th><th>MCQs</th><th></th></tr></thead><tbody>'+lr+'</tbody></table></div>';}
function initTrackerCharts(){for(var k in chartInst){try{chartInst[k].destroy();}catch(e){}}chartInst={};var ctx1=document.getElementById('trkHC');var ctx2=document.getElementById('trkMC');var co={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b949e',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#8b949e',font:{size:10}},grid:{color:'rgba(48,54,61,0.5)'},beginAtZero:true}}};if(ctx1)chartInst.th=new Chart(ctx1,{type:'bar',data:{labels:chartStore.tL,datasets:[{data:chartStore.tH,backgroundColor:'rgba(45,212,191,0.5)',borderColor:'#2dd4bf',borderWidth:1,borderRadius:4}]},options:co});if(ctx2)chartInst.tm=new Chart(ctx2,{type:'bar',data:{labels:chartStore.tL,datasets:[{data:chartStore.tM,backgroundColor:'rgba(251,191,36,0.5)',borderColor:'#fbbf24',borderWidth:1,borderRadius:4}]},options:co});}

function buildAnalytics(){var ov=getOverall();var stats=getStats();var circ=2*Math.PI*58;var off=circ-(ov/100)*circ;var sorted=SUBJECTS.slice().sort(function(a,b){return b.w-a.w;});var sL=[],sP=[],sC=[],sB=[];for(var i=0;i<sorted.length;i++){var s=sorted[i];var p=getSubProg(s.name);sL.push(s.name.length>12?s.name.substring(0,10)+'..':s.name);sP.push(p);var cl=p>=70?'#4ade80':p>=30?'#fbbf24':'#fb7185';sC.push(cl);sB.push(p>=70?'rgba(74,222,128,0.6)':p>=30?'rgba(251,191,36,0.6)':'rgba(251,113,133,0.6)');}chartStore.aSL=sL;chartStore.aSP=sP;chartStore.aSC=sC;chartStore.aSB=sB;var allD=Object.keys(state.studyLog).sort();var aH=[],aM=[],aL=[];for(var i=0;i<allD.length;i++){var d=allD[i];var dt=new Date(d+'T00:00:00');aL.push(dt.getDate()+'/'+(dt.getMonth()+1));aH.push(state.studyLog[d].hours);aM.push(state.studyLog[d].mcqs);}chartStore.aL=aL;chartStore.aH=aH;chartStore.aM=aM;var cats=[{name:'Pre-Clinical',subs:['Anatomy','Physiology','Biochemistry'],color:'#2dd4bf'},{name:'Para-Clinical',subs:['Pathology','Pharmacology','Microbiology'],color:'#fbbf24'},{name:'Clinical',subs:['General Medicine','General Surgery','OBG','Pediatrics'],color:'#4ade80'},{name:'Short Subjects',subs:['ENT','Ophthalmology','Community Medicine','Forensic Medicine','Dermatology','Psychiatry','Orthopedics','Anesthesia','Radiology'],color:'#fb7185'}];var ch='';for(var i=0;i<cats.length;i++){var c=cats[i];var tw=0,wp=0;for(var j=0;j<c.subs.length;j++){var sn=c.subs[j];for(var k=0;k<SUBJECTS.length;k++)if(SUBJECTS[k].name===sn){tw+=SUBJECTS[k].w;wp+=getSubProg(sn)*SUBJECTS[k].w;break;}}var pct=tw?Math.round(wp/tw):0;ch+='<div style="display:flex;align-items:center;gap:12px;padding:10px 0;'+(i<cats.length-1?'border-bottom:1px solid var(--border)':'')+'"><div style="width:12px;height:12px;border-radius:3px;background:'+c.color+';flex-shrink:0"></div><span style="font-size:14px;flex:1">'+c.name+'</span><div class="progress-bar" style="width:160px"><div class="progress-fill" style="width:'+pct+'%;background:'+c.color+'"></div></div><span style="font-size:14px;font-weight:700;width:40px;text-align:right;color:'+c.color+'">'+pct+'%</span></div>';}return '<div class="fade-up" style="margin-bottom:20px"><h2 style="font-size:22px;margin-bottom:4px">Analytics</h2><p style="color:var(--muted);font-size:14px">Deep dive into your preparation progress.</p></div><div class="ana-top" style="display:grid;grid-template-columns:280px 1fr;gap:20px;margin-bottom:20px;align-items:start"><div class="card fade-up fade-up-d1" style="text-align:center"><svg width="160" height="160" style="display:block;margin:0 auto 12px"><circle cx="80" cy="80" r="58" fill="none" stroke="var(--border)" stroke-width="10"/><circle cx="80" cy="80" r="58" fill="none" stroke="'+progCol(ov)+'" stroke-width="10" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'" transform="rotate(-90 80 80)" style="transition:stroke-dashoffset 1s ease"/><text x="80" y="75" text-anchor="middle" fill="var(--text)" font-family="Space Grotesk" font-size="32" font-weight="700">'+ov+'%</text><text x="80" y="95" text-anchor="middle" fill="var(--muted)" font-family="DM Sans" font-size="11">Overall</text></svg><div style="font-size:13px;color:var(--muted)">'+stats.th+'h studied &middot; '+stats.tm+' MCQs</div></div><div class="card fade-up fade-up-d2"><h3 style="font-size:16px;margin-bottom:8px">Category Breakdown</h3>'+ch+'</div></div><div class="card fade-up fade-up-d2" style="margin-bottom:20px"><h3 style="font-size:16px;margin-bottom:12px">Subject Progress (by weightage)</h3><canvas id="anaSub" height="'+Math.max(300,SUBJECTS.length*22)+'"></canvas></div><div class="chart-row" style="display:grid;grid-template-columns:1fr 1fr;gap:20px"><div class="card fade-up fade-up-d3"><h3 style="font-size:16px;margin-bottom:12px">Study Hours Trend</h3><canvas id="anaHrs" height="200"></canvas></div><div class="card fade-up fade-up-d4"><h3 style="font-size:16px;margin-bottom:12px">MCQs Trend</h3><canvas id="anaMcq" height="200"></canvas></div></div>';}
function initAnaCharts(){for(var k in chartInst){try{chartInst[k].destroy();}catch(e){}}chartInst={};var co={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b949e',font:{size:11}},grid:{display:false}},y:{ticks:{color:'#8b949e',font:{size:11}},grid:{color:'rgba(48,54,61,0.5)'},beginAtZero:true,max:100}}};var co2={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b949e',font:{size:11}},grid:{display:false}},y:{ticks:{color:'#8b949e',font:{size:11}},grid:{color:'rgba(48,54,61,0.5)'},beginAtZero:true}}};var ctx1=document.getElementById('anaSub');if(ctx1)chartInst.as=new Chart(ctx1,{type:'bar',data:{labels:chartStore.aSL,datasets:[{data:chartStore.aSP,backgroundColor:chartStore.aSB,borderColor:chartStore.aSC,borderWidth:1,borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{max:100,ticks:{color:'#8b949e',font:{size:11}},grid:{color:'rgba(48,54,61,0.5)'}},y:{ticks:{color:'#8b949e',font:{size:11}},grid:{display:false}}}}});var ctx2=document.getElementById('anaHrs');if(ctx2)chartInst.ah=new Chart(ctx2,{type:'line',data:{labels:chartStore.aL,datasets:[{data:chartStore.aH,borderColor:'#2dd4bf',backgroundColor:'rgba(45,212,191,0.1)',fill:true,tension:.3,pointRadius:3,pointBackgroundColor:'#2dd4bf'}]},options:co2});var ctx3=document.getElementById('anaMcq');if(ctx3)chartInst.am=new Chart(ctx3,{type:'line',data:{labels:chartStore.aL,datasets:[{data:chartStore.aM,borderColor:'#fbbf24',backgroundColor:'rgba(251,191,36,0.1)',fill:true,tension:.3,pointRadius:3,pointBackgroundColor:'#fbbf24'}]},options:co2});}

/* === EVENT HANDLERS === */
function setStart(){var inp=document.getElementById('startDateInput');if(!inp||!inp.value)return;state.startDate=inp.value;state.dailyChecks={};save();renderSidebar();renderContent();showToast('Battle Plan started!','success');}
function resetStart(){if(!confirm('Change start date? Daily checklists will reset.'))return;state.startDate=null;state.dailyChecks={};save();renderSidebar();renderContent();}
function handleSlotClick(el){var dn=parseInt(el.dataset.day);var si=parseInt(el.dataset.slot);if(!state.dailyChecks[dn])state.dailyChecks[dn]={};state.dailyChecks[dn][si]=!state.dailyChecks[dn][si];save();renderContent();var sched=getSched(dn);var tot=0,done=0;for(var i=0;i<sched.length;i++)if(sched[i].type==='study'){tot++;if(state.dailyChecks[dn][i])done++;}if(done===tot)showToast('Day '+dn+' complete! Great work.','success');}
function handleTopicClick(el){var sn=el.dataset.sub;var tp=el.dataset.topic;if(!state.topics[sn])state.topics[sn]={};state.topics[sn][tp]=!state.topics[sn][tp];save();renderSidebar();var sub=null;for(var i=0;i<SUBJECTS.length;i++)if(SUBJECTS[i].name===sn){sub=SUBJECTS[i];break;}if(!sub)return;var p=getSubProg(sn);var done=0;for(var j=0;j<sub.topics.length;j++)if(state.topics[sn][sub.topics[j]])done++;var idx=SUBJECTS.indexOf(sub);var pctEl=document.getElementById('accPct'+idx);if(pctEl){pctEl.textContent=p+'%';pctEl.style.color=progCol(p);}var headers=document.querySelectorAll('.subject-header');if(headers[idx]){var pb=headers[idx].querySelector('.progress-fill');if(pb)pb.style.width=p+'%';var info=headers[idx].querySelector('span[style*="font-weight:400"]');if(info)info.textContent=sub.w+'Q \u00b7 '+done+'/'+sub.topics.length;}var cb=el.querySelector('input[type="checkbox"]');if(cb)cb.checked=state.topics[sn][tp];}
function logStudy(){var hEl=document.getElementById('logH');var mEl=document.getElementById('logM');if(!hEl||!mEl)return;var hours=parseFloat(hEl.value)||0;var mcqs=parseInt(mEl.value)||0;if(hours<=0&&mcqs<=0){showToast('Enter hours or MCQs to log.','info');return;}var today=new Date().toISOString().split('T')[0];state.studyLog[today]={hours:hours,mcqs:mcqs};save();renderSidebar();renderContent();showToast('Logged: '+hours+'h, '+mcqs+' MCQs','success');}
function delLog(d){if(!confirm('Delete log for '+d+'?'))return;delete state.studyLog[d];save();renderSidebar();renderContent();showToast('Entry deleted.','info');}

/* === PWA + EXPORT/IMPORT === */
function setupPWA(){
  var iconSvg='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 512 512%27%3E%3Crect width=%27512%27 height=%27512%27 rx=%2780%27 fill=%27%230d1117%27/%3E%3Cpath d=%27M256 100L140 185v180l116 85 116-85V185L256 100z%27 fill=%27none%27 stroke=%27%232dd4bf%27 stroke-width=%2716%27/%3E%3Cpath d=%27M210 260l32 32 60-64%27 fill=%27none%27 stroke=%27%232dd4bf%27 stroke-width=%2716%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27/%3E%3C/svg%3E';
  var manifest={name:'NEET PG Battle Plan',short_name:'NEET PG',description:'62-Day NEET PG Preparation Tracker',start_url:'.',display:'standalone',background_color:'#0d1117',theme_color:'#2dd4bf',icons:[{src:iconSvg,sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}]};
  var blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  var link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(blob);document.head.appendChild(link);
  var appleLink=document.createElement('link');appleLink.rel='apple-touch-icon';appleLink.href=iconSvg;document.head.appendChild(appleLink);
}
function exportData(){
  var stats=getStats();
  var backup={app:'NEET PG Battle Plan',version:6,exportDate:new Date().toISOString(),summary:{overallProgress:getOverall(),studyHours:stats.th,mcqsDone:stats.tm,streak:getStreak(),daysLogged:stats.days},data:state};
  var blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;
  var d=new Date();var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  a.download='neetpg_backup_'+ds+'.json';a.click();URL.revokeObjectURL(url);
  state.lastExport=new Date().toISOString();save();updateBackupUI();
  showToast('Backup saved to Downloads!','success');
}
function triggerImport(){document.getElementById('importFile').click();}
function handleImportFile(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{var backup=JSON.parse(ev.target.result);
      if(!backup.data||!backup.data.topics){showToast('Invalid backup file.','info');return;}
      pendingImport=backup;var info=document.getElementById('importInfo');
      var sum=backup.summary||{};
      info.innerHTML='Replace all current data with this backup?<br><br><span style="font-size:12px;color:var(--muted)">Backup from: <strong style="color:var(--text)">'+new Date(backup.exportDate).toLocaleString('en-IN')+'</strong></span><br><br>'+
        '<span style="display:inline-flex;align-items:center;gap:6px;background:var(--accent-g);color:var(--accent);padding:4px 12px;border-radius:8px;font-size:13px;font-weight:600"><i class="fas fa-chart-pie"></i> '+((sum.overallProgress!==undefined)?sum.overallProgress+'%':'N/A')+'</span> '+
        '<span style="display:inline-flex;align-items:center;gap:6px;background:var(--amber-g);color:var(--amber);padding:4px 12px;border-radius:8px;font-size:13px;font-weight:600"><i class="fas fa-clock"></i> '+((sum.studyHours!==undefined)?sum.studyHours+'h':'N/A')+'</span> '+
        '<span style="display:inline-flex;align-items:center;gap:6px;background:var(--green-g);color:var(--green);padding:4px 12px;border-radius:8px;font-size:13px;font-weight:600"><i class="fas fa-list-check"></i> '+((sum.mcqsDone!==undefined)?sum.mcqsDone:'N/A')+'</span><br><br>'+
        '<span style="color:var(--rose);font-size:12px"><i class="fas fa-triangle-exclamation" style="margin-right:4px"></i>This will permanently overwrite your current progress!</span>';
      document.getElementById('importModal').classList.add('open');
    }catch(err){showToast('Could not read file.','info');}
  };reader.readAsText(file);e.target.value='';
}
function confirmImport(){
  if(!pendingImport)return;
  state=pendingImport.data;if(!state.dailyChecks)state.dailyChecks={};if(!state.studyLog)state.studyLog={};
  save();closeImportModal();pendingImport=null;renderSidebar();renderContent();
  showToast('Data restored from backup!','success');
}
function closeImportModal(){document.getElementById('importModal').classList.remove('open');pendingImport=null;}
function updateBackupUI(){
  var el=document.getElementById('lastBackup');if(!el)return;
  if(state.lastExport){var d=new Date(state.lastExport);el.innerHTML='<i class="fas fa-check-circle" style="color:var(--green);margin-right:4px"></i>Last backup: '+d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}
  else{el.innerHTML='<i class="fas fa-info-circle" style="margin-right:4px"></i>No backup yet &mdash; click Export';}
}
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;var btn=document.getElementById('installBtn');if(btn)btn.style.display='none';});}}
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;var btn=document.getElementById('installBtn');if(btn)btn.style.display='flex';});
window.addEventListener('beforeunload',function(){save();});
document.getElementById('importFile').addEventListener('change',handleImportFile);

/* === BOOT === */
load();setupPWA();renderSidebar();renderContent();
</script>
</body>
